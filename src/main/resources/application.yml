spring:
  application:
    name: hammer-internal
  datasource:
    url: jdbc:postgresql://localhost:5432/bear
    username: ${DB_USERNAME:hobom}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: 8090

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
